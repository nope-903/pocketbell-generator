<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real Retro Pocket Bell Generator</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Galmuri9:wght@400;700&family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    body {
      font-family: 'Galmuri9', sans-serif;
      background-color: #0f1016;
      background-image: 
        radial-gradient(circle at 20% 20%, rgba(244, 63, 94, 0.05) 0, transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(59, 130, 246, 0.05) 0, transparent 40%);
    }

    /* 리얼 LCD 화면 도트 매트릭스 & 유리 질감 */
    .lcd-screen {
      position: relative;
      overflow: hidden;
      box-shadow: inset 3px 3px 10px rgba(0, 0, 0, 0.6), inset -2px -2px 5px rgba(255,255,255,0.1);
      transition: background-color 0.4s ease;
    }

    /* LCD 마이크로 격자 라인 필터 (도트 질감) */
    .lcd-screen::before {
      content: " ";
      display: block;
      position: absolute;
      top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(0, 0, 0, 0.12) 50%, rgba(0, 0, 0, 0) 50%), 
                  linear-gradient(90deg, rgba(0, 0, 0, 0.12) 50%, rgba(0, 0, 0, 0) 50%);
      background-size: 3px 3px;
      z-index: 5;
      pointer-events: none;
    }

    /* 리얼 글래스 반사광 효과 (Glossy Reflection Overlay) */
    .lcd-glass-reflection {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0.05) 30%, transparent 50%);
      z-index: 6;
      pointer-events: none;
    }

    /* 텍스트 렌더링 스타일 */
    .lcd-text {
      font-family: 'Galmuri9', monospace;
      letter-spacing: 0.12em;
      font-weight: 700;
      text-shadow: 1px 1px 0px rgba(0,0,0,0.15);
    }

    /* 리얼 3D 가젯 바디 섀도우 */
    .real-device {
      box-shadow: 
        0 25px 60px -15px rgba(0, 0, 0, 0.95),
        0 10px 25px -10px rgba(0, 0, 0, 0.8),
        inset 0 4px 6px rgba(255, 255, 255, 0.25),
        inset 0 -6px 12px rgba(0, 0, 0, 0.6);
      transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.15);
    }

    /* 백라이트 전원 켜짐 순간 껌벅임 효과 */
    @keyframes lcdFlash {
      0% { opacity: 0.4; filter: brightness(0.5); }
      30% { opacity: 1; filter: brightness(1.5); }
      60% { opacity: 0.7; filter: brightness(0.8); }
      100% { opacity: 1; filter: brightness(1); }
    }
    .lcd-active {
      animation: lcdFlash 0.5s ease-out forwards;
    }

    /* 피지컬 키 하향 인터랙션 */
    .tact-btn {
      transition: all 0.08s ease;
      position: relative;
    }
    .tact-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      box-shadow: inset 0 2px 2px rgba(255,255,255,0.4), inset 0 -2px 2px rgba(0,0,0,0.4);
      pointer-events: none;
    }
  </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col justify-between p-4 md:p-6">

  <header class="w-full max-w-6xl mx-auto flex flex-col sm:flex-row justify-between items-center py-4 border-b border-slate-800/80 mb-6 gap-4">

      <div>

    </div>
    
    <div class="flex bg-slate-900 p-1.5 rounded-xl border border-slate-800 shadow-inner">

      <button onclick="changeDevice('kitsch')" id="tab-kitsch" class="px-4 py-2 rounded-lg text-xs font-bold text-slate-400 transition-all hover:text-slate-200">
        Kitsch Theme

    </div>
  </header>

  <main class="w-full max-w-6xl mx-auto my-auto grid grid-cols-1 lg:grid-cols-12 gap-8 items-center">

            <div id="model-text" class="text-[9px] font-sans font-bold tracking-widest text-white/60 uppercase">
              </div>
          </div>

          <div class="w-full px-2 z-10">
            <div id="lcd-bezel" class="p-3 rounded-[24px] transition-colors duration-500">
              
              <div id="lcd-screen" class="lcd-screen lcd-active w-full h-[110px] sm:h-[125px] rounded-lg p-3 flex flex-col justify-between">
                <div class="lcd-glass-reflection"></div>

                  <div class="flex items-center gap-1.5" id="lcd-indicators-left">

                  </div>
                  <div id="lcd-line-2" class="lcd-text text-base sm:text-lg text-center w-full truncate">
                    889-9191
                  </div>
                </div>

                <div class="flex justify-between items-center text-[9px] font-bold opacity-80 z-10 font-mono">
                  <div id="lcd-foot-left">▲ ♫</div>
                  <div id="lcd-foot-mid">◀ ▶</div>
                  <div id="lcd-foot-right">▼</div>
                </div>

              </div>

            </div>
          </div>

          <div id="keypad-panel" class="w-full flex justify-around items-center px-4 pb-1 z-10">
            </div>

        </div>

      </div>
      
    </section>

    <section class="lg:col-span-5 bg-slate-900/90 p-6 rounded-3xl border border-slate-800 shadow-2xl space-y-5">
      
      <div class="border-b border-slate-800 pb-2">
        <h2 class="text-lg font-black text-pink-500 flex items-center gap-2">
          <span><i class="fa-solid fa-sliders"></i></span>
          <span>제어 및 커스텀</span>
        </h2>
        <p class="text-[10px] text-slate-500 font-mono tracking-wider">POCKET BELL CONTROLLER</p>
      </div>

      <div class="space-y-3">
        <div>
          <div class="flex justify-between items-center mb-1">
            <label class="text-xs font-bold text-slate-400">첫 번째 줄 (일본어 / 영숫자)</label>

        </div>

        <div>

            <span class="text-[10px] font-mono text-slate-600" id="count-2">8 / 15</span>
          </div>
          <input type="text" id="input-2" oninput="syncLCD()" maxlength="15" value="889-9191" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm text-pink-400 font-bold tracking-wider focus:outline-none focus:border-pink-500 transition-all">
        </div>
      </div>

      <div class="bg-slate-950 p-4 rounded-2xl border border-slate-850 space-y-2">
        <span class="text-xs font-bold text-slate-400 block"><i class="fa-solid fa-bolt text-yellow-500 mr-1"></i> 레트로 퀵 프리셋</span>
        <div class="flex flex-wrap gap-1.5">
          <button onclick="loadPreset('緊急呼出', '889-9191')" class="text-[10px] bg-slate-800 hover:bg-slate-700 text-slate-300 px-2 py-1.5 rounded-lg">긴급호출 (漢字)</button>
          <button onclick="loadPreset('ｷﾝｷｭｳﾖﾋﾞﾀﾞｼ', '889-9191')" class="text-[10px] bg-slate-800 hover:bg-slate-700 text-slate-300 px-2 py-1.5 rounded-lg">긴급호출 (가타카나)</button>
          <button onclick="loadPreset('1010235', '열렬히 사모해♡')" class="text-[10px] bg-slate-800 hover:bg-slate-700 text-slate-300 px-2 py-1.5 rounded-lg">1010235 (열렬사모)</button>
          <button onclick="loadPreset('8282', '빨리 연락해줘!')" class="text-[10px] bg-slate-800 hover:bg-slate-700 text-slate-300 px-2 py-1.5 rounded-lg">8282 (빨리빨리)</button>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-[11px] text-slate-400 block mb-1">📶 안테나 수신 감도</label>
          <select id="config-signal" onchange="applyStatus()" class="w-full bg-slate-950 border border-slate-850 rounded-lg p-2 text-xs text-slate-300 focus:outline-none">
            <option value="3">강함 (Level 3)</option>
            <option value="1">약함 (Level 1)</option>
            <option value="0">서비스 영역 외 (OUT)</option>
          </select>
        </div>
        <div>
          <label class="text-[11px] text-slate-400 block mb-1">🔋 배터리 잔량</label>
          <select id="config-battery" onchange="applyStatus()" class="w-full bg-slate-950 border border-slate-850 rounded-lg p-2 text-xs text-slate-300 focus:outline-none">
            <option value="full">가득참 (100%)</option>
            <option value="low">부족함 (10%)</option>
          </select>
        </div>
      </div>

      <div class="space-y-2 pt-3 border-t border-slate-850">
        <button onclick="exportPNG()" class="w-full bg-gradient-to-r from-pink-500 to-rose-500 hover:from-pink-600 hover:to-rose-600 text-white font-black py-4 px-6 rounded-2xl shadow-xl shadow-pink-900/20 transition-all flex items-center justify-center gap-2">
          <i class="fa-solid fa-camera-retro text-lg"></i>
          <span>고화질 PNG 이미지로 저장하기</span>
        </button>
        <div class="grid grid-cols-2 gap-2">
          <button onclick="triggerFlash()" class="bg-slate-800 hover:bg-slate-750 text-slate-300 text-xs py-2.5 rounded-xl flex items-center justify-center gap-2">
            <i class="fa-solid fa-arrows-rotate"></i>
            <span>LCD 재부팅</span>
          </button>
          <button onclick="playBeep()" class="bg-slate-800 hover:bg-slate-750 text-slate-300 text-xs py-2.5 rounded-xl flex items-center justify-center gap-2">
            <i class="fa-solid fa-volume-high"></i>
            <span>비프 호출음</span>
          </button>
        </div>
      </div>

    </section>

  </main>

  <footer class="w-full max-w-6xl mx-auto text-center py-6 border-t border-slate-800/60 mt-8">
    <p class="text-xs text-slate-500">
      &copy; 2026 Real Retro Pocket Bell Emulator. Designed for authentic aesthetics.
    </p>
  </footer>

  <script>
    let currentDevice = 'telemessage';

    // 3D 하드웨어 사양 딕셔너리
    const devices = {
      'telemessage': {
        name: "Telemessage",
        model: "Multi Message TM-95",
        // 실제 블루 메탈릭 느낌의 정밀 사출 성형 구현 (입체적 하이라이트)
        bodyClass: "bg-gradient-to-br from-[#1e6a9f] via-[#104b73] to-[#0c314c] border-[3px] border-[#297eb8]/50",
        bezelClass: "bg-gradient-to-b from-[#181a1d] to-[#0d0e10] border-2 border-black/40 shadow-2xl",
        lcdBg: "#7eb57e", // 텔레메세지 특유의 밝은 연두색 LCD
        lcdColor: "#0f2211",
        decorHTML: `
          <div class="absolute -left-[4px] top-[110px] w-[5px] h-9 bg-zinc-400 rounded-l-md border-y border-l border-zinc-600 shadow-inner"></div>
          <div class="absolute left-3 top-3 w-5 h-5 flex items-center justify-center z-25">
            <span class="text-[12px] text-zinc-900 font-black">◀</span>
          </div>
        `,
        brandLogoHTML: `
          <div class="flex items-center gap-1 text-white">
            <span class="font-sans font-black tracking-tighter text-base italic border-b border-white leading-none">T<sub class="text-[8px] font-bold">M</sub></span>
            <span class="font-sans font-bold text-[11px] italic tracking-tight">Telemessage</span>
          </div>
        `,
        // 텔레메세지 하단 알약 버튼 3개 + 베젤 램프/스위치 기호 완벽 복각
        buttonsHTML: `
          <div class="flex flex-col items-center gap-1">
            <span class="text-[8px] font-bold text-zinc-400 flex items-center gap-0.5"><i class="fa-regular fa-lightbulb"></i>💡</span>
            <button onclick="triggerFlash(); playToggle();" class="tact-btn w-12 sm:w-14 h-5 sm:h-6 rounded-full bg-gradient-to-b from-[#f2f2f2] to-[#bcbcbc] shadow-md border-b-2 border-zinc-400/80"></button>
          </div>
          <div class="flex flex-col items-center gap-1">
            <span class="text-[8px] font-bold text-zinc-400">▼ ▲</span>
            <button onclick="triggerFlash(); playToggle();" class="tact-btn w-12 sm:w-14 h-5 sm:h-6 rounded-full bg-gradient-to-b from-[#f2f2f2] to-[#bcbcbc] shadow-md border-b-2 border-zinc-400/80"></button>
          </div>
          <div class="flex flex-col items-center gap-1">
            <span class="text-[8px] font-bold text-zinc-400">◀ ▶</span>
            <button onclick="triggerFlash(); playToggle();" class="tact-btn w-12 sm:w-14 h-5 sm:h-6 rounded-full bg-gradient-to-b from-[#f2f2f2] to-[#bcbcbc] shadow-md border-b-2 border-zinc-400/80"></button>
          </div>
        `
      },
      'pokebell': {
        name: "Poke Bell",
        model: "RC-101",
        // 리얼 80~90년대 무선 호출기 블랙 텍스처 플라스틱 바디
        bodyClass: "bg-gradient-to-br from-[#2b2d35] via-[#1a1b20] to-[#0d0e12] border-[3px] border-zinc-700/50",
        bezelClass: "bg-gradient-to-r from-[#141517] to-[#141517] border-2 border-black/40",
        lcdBg: "#96a193", // 가라앉은 잿빛-그린 LCD
        lcdColor: "#171f16",
        decorHTML: `
          <div class="absolute -top-[10px] left-16 w-8 h-3 bg-zinc-600 rounded-t-sm border-t border-zinc-400 shadow-inner"></div>
          <div class="absolute -top-[12px] left-28 w-12 h-[13px] bg-red-600 rounded-t-md border-t border-red-400 shadow flex items-center justify-center"><span class="text-[7px] text-white font-bold font-mono">ALERT</span></div>
          <div class="absolute left-3 top-28 w-[5px] h-10 bg-zinc-500 rounded-r-md"></div>
        `,
        brandLogoHTML: `
          <div class="flex items-center gap-1 text-[#42b9d0] font-sans font-bold text-[13px] tracking-tight">
            <span>RC-101</span>
          </div>
        `,
        buttonsHTML: `
          <div class="w-1/3 text-left">
            <span class="text-[8.5px] font-sans font-bold text-[#42b9d0] tracking-tight flex items-center gap-0.5"><i class="fa-solid fa-circle-notch"></i> NTT</span>
          </div>
          <div class="w-2/3 text-right pr-4">
            <span class="text-[12px] font-sans font-bold text-slate-400 tracking-wider">POCKET BELL</span>
          </div>
        `
      },
      'kitsch': {
        name: "Kitsch",
        model: "Lovely Star-77",
        // 파스텔 핑크와 퍼플 매직 그라데이션 광택 투톤 바디
        bodyClass: "bg-gradient-to-br from-[#ffd6e8] via-[#ffaecb] to-[#c084fc] border-[3px] border-white/60",
        bezelClass: "bg-[#ffd6e8] border-2 border-[#ff9ebb] shadow-md",
        lcdBg: "#aef3ff", // 맑은 하늘색-네온 파스텔 백라이트 액정
        lcdColor: "#152e3b",
        decorHTML: `
          <div class="absolute left-4 bottom-3 w-12 h-12 opacity-80 pointer-events-none">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M50 0 L58 35 L100 42 L58 50 L50 100 L42 50 L0 42 L42 35 Z" fill="#ffffff" />
            </svg>
          </div>
          <div class="absolute right-4 bottom-2 w-8 h-8 opacity-70 pointer-events-none">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="50" cy="50" r="30" fill="#f472b6" />
              <circle cx="30" cy="50" r="30" fill="#f472b6" />
              <circle cx="70" cy="50" r="30" fill="#f472b6" />
              <circle cx="50" cy="30" r="30" fill="#f472b6" />
              <circle cx="50" cy="70" r="30" fill="#f472b6" />
              <circle cx="50" cy="50" r="10" fill="#fef08a" />
            </svg>
          </div>
          <div class="absolute left-4 top-24 w-4 h-3 bg-red-400 rounded-full border border-red-300"></div>
        `,
        brandLogoHTML: `
          <div class="flex items-center gap-1 text-pink-600">
            <span class="font-sans font-black italic text-xs tracking-wider">♥ Lovely Beep ♥</span>
          </div>
        `,
        buttonsHTML: `
          <div class="flex justify-around w-full">
            <button onclick="triggerFlash(); playToggle();" class="tact-btn w-8 h-8 rounded-full bg-gradient-to-b from-yellow-100 to-yellow-300 border border-yellow-400 text-yellow-700 flex items-center justify-center text-xs" title="Reset">★</button>
            <div class="text-[7.5px] font-bold text-pink-700/80 font-mono text-center">GALAXY MAIL<br>SWEET SYSTEM</div>
            <button onclick="playBeep()" class="tact-btn w-8 h-8 rounded-full bg-gradient-to-b from-purple-100 to-purple-300 border border-purple-400 text-purple-700 flex items-center justify-center text-xs" title="Alert">♪</button>
          </div>
        `
      }
    };

    // 1. 기종 변경 적용 함수
    function changeDevice(modelKey) {
      currentDevice = modelKey;
      const spec = devices[modelKey];

      // 활성 탭 UI 갱신
      ['tele', 'poke', 'kitsch'].forEach(tab => {
        document.getElementById(`tab-${tab}`).className = "px-4 py-2 rounded-lg text-xs font-bold transition-all text-slate-400 hover:text-slate-200";
      });
      const activeTabMap = { 'telemessage': 'tele', 'pokebell': 'poke', 'kitsch': 'kitsch' };
      document.getElementById(`tab-${activeTabMap[modelKey]}`).className = "px-4 py-2 rounded-lg text-xs font-bold transition-all bg-pink-600 text-white shadow";

      // 하드웨어 하우징 시각 변화 적용
      const bellBody = document.getElementById('bell-body');
      bellBody.className = `real-device w-[370px] sm:w-[440px] h-[270px] sm:h-[310px] rounded-[42px] relative p-5 flex flex-col justify-between ${spec.bodyClass}`;

      // 데코레이션 가젯 부품 로드
      document.getElementById('device-decorations').innerHTML = spec.decorHTML;

      // 텍스트/로고 변경
      document.getElementById('brand-logo').innerHTML = spec.brandLogoHTML;
      document.getElementById('model-text').textContent = spec.model;

      // 하단 키패드 스위치 로드
      document.getElementById('keypad-panel').innerHTML = spec.buttonsHTML;

      // 베젤 테두리 및 LCD 스키마 갱신
      const lcdBezel = document.getElementById('lcd-bezel');
      const lcdScreen = document.getElementById('lcd-screen');
      lcdBezel.className = `p-3 rounded-[24px] ${spec.bezelClass}`;
      lcdScreen.style.backgroundColor = spec.lcdBg;
      lcdScreen.style.color = spec.lcdColor;

      // LCD 내부 상단 레이아웃 (NTT 특유의 가이드 배치)
      const numGuide = document.getElementById('lcd-num-guide');
      if (modelKey === 'pokebell') {
        numGuide.textContent = "A  1 2 3 4 5 6";
      } else {
        numGuide.textContent = "POCKET BELL";
      }

      playToggle();
      triggerFlash();
    }

    // 2. 실시간 LCD 입력 텍스트 동기화
    function syncLCD() {
      const val1 = document.getElementById('input-1').value;
      const val2 = document.getElementById('input-2').value;

      document.getElementById('count-1').textContent = `${val1.length} / 15`;
      document.getElementById('count-2').textContent = `${val2.length} / 15`;

      document.getElementById('lcd-line-1').textContent = val1 !== "" ? val1 : " ";
      document.getElementById('lcd-line-2').textContent = val2 !== "" ? val2 : " ";
    }

    // 3. 원클릭 퀵 프리셋 주입
    function loadPreset(line1, line2) {
      document.getElementById('input-1').value = line1;
      document.getElementById('input-2').value = line2;
      syncLCD();
      triggerFlash();
      playBeep();
    }

    // 4. 안테나 / 배터리 가시성 변형
    function applyStatus() {
      const sig = document.getElementById('config-signal').value;
      const bat = document.getElementById('config-battery').value;

      const sigEl = document.getElementById('lcd-sig');
      const batEl = document.getElementById('lcd-bat');

      if (sig === "3") {
        sigEl.innerHTML = `<i class="fa-solid fa-signal text-[8px]"></i>`;
      } else if (sig === "1") {
        sigEl.innerHTML = `<i class="fa-solid fa-rss text-[8px]"></i>`;
      } else {
        sigEl.innerHTML = `<span class="text-[7.5px] border border-current px-0.5 rounded leading-none scale-90">OUT</span>`;
      }

      if (bat === "full") {
        batEl.innerHTML = `<i class="fa-solid fa-battery-three-quarters text-[9px]"></i>`;
      } else {
        batEl.innerHTML = `<i class="fa-solid fa-battery-empty text-[9px] animate-pulse text-red-800"></i>`;
      }
    }

    // 5. LCD 켜짐 펄스 애니메이션 구동
    function triggerFlash() {
      const lcd = document.getElementById('lcd-screen');
      lcd.classList.remove('lcd-active');
      void lcd.offsetWidth; // Force Reflow
      lcd.classList.add('lcd-active');
    }

    // 6. Web Audio API 기반 버저 사운드 에뮬레이팅
    let audioCtx = null;

    function playToggle() {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(3000, now);

        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(0.08, now + 0.002);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.04);

        osc.start(now);
        osc.stop(now + 0.05);
      } catch(e){}
    }

    function playBeep() {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const now = audioCtx.currentTime;

        function beep(time, duration) {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();

          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.type = 'sine';
          osc.frequency.setValueAtTime(2600, time);

          gain.gain.setValueAtTime(0, time);
          gain.gain.linearRampToValueAtTime(0.18, time + 0.01);
          gain.gain.exponentialRampToValueAtTime(0.001, time + duration - 0.01);

          osc.start(time);
          osc.stop(time + duration);
        }

        // 클래식 수신 비프 리듬 (삐빅- 삐빅-)
        beep(now, 0.12);
        beep(now + 0.15, 0.12);
        beep(now + 0.4, 0.12);
        beep(now + 0.55, 0.12);
      } catch(e){}
    }

    // 7. html2canvas 고품질 PNG 다운로드 프로세스
    function exportPNG() {
      const captureArea = document.getElementById('capture-area');

      // 로딩 위젯 부착
      const loader = document.createElement('div');
      loader.className = "fixed inset-0 bg-black/80 flex flex-col justify-center items-center z-50 text-white font-sans text-sm gap-3";
      loader.innerHTML = `
        <i class="fa-solid fa-spinner animate-spin text-3xl text-pink-500"></i>
        <span class="font-bold tracking-wider">포켓벨 고화질 투명 이미지 인코딩 중...</span>
      `;
      document.body.appendChild(loader);

      setTimeout(() => {
        html2canvas(captureArea, {
          backgroundColor: null, // 완전한 투명 배경으로 출력하여 굿즈 제작/합성 용이
          scale: 3,             // 3배 확대 초고해상도 렌더링 적용
          logging: false,
          useCORS: true
        }).then(canvas => {
          const a = document.createElement('a');
          a.download = `retro_pocketbell_${Date.now().toString().slice(-6)}.png`;
          a.href = canvas.toDataURL('image/png');
          a.click();
          document.body.removeChild(loader);
        }).catch(err => {
          console.error(err);
          document.body.removeChild(loader);
          alert("이미지 변환 중 오류가 발생했습니다.");
        });
      }, 500);
    }

    window.onload = function() {
      changeDevice('telemessage');
      syncLCD();
      applyStatus();
    }
  </script>
</body>
</html>
