<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real Retro Pocket Bell Emulator Pro</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Galmuri9:wght@400;700&family=Share+Tech+Mono&family=Great+Vibes&display=swap" rel="stylesheet">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    body {
      font-family: 'Galmuri9', sans-serif;
      background-color: #0b0c10;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(244, 63, 94, 0.08) 0, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.08) 0, transparent 40%);
    }

    /* 초극사실 3D 하드웨어 케이스 물리 그림자 */
    .real-device {
      box-shadow: 
        0 30px 70px -15px rgba(0, 0, 0, 0.95),
        0 15px 30px -10px rgba(0, 0, 0, 0.9),
        inset 0 4px 5px rgba(255, 255, 255, 0.35),
        inset 0 -8px 16px rgba(0, 0, 0, 0.7);
      transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.1);
    }

    /* 입체감이 살아있는 LCD 외부 베젤 몰딩 */
    .bezel-3d {
      box-shadow: 
        inset 0 4px 10px rgba(0, 0, 0, 0.9),
        inset 0 -2px 5px rgba(255, 255, 255, 0.15),
        0 2px 4px rgba(255, 255, 255, 0.1),
        0 -1px 2px rgba(0, 0, 0, 0.5);
    }

    /* 리얼 글래스 곡면 굴절 반사광 */
    .lcd-glass-reflection {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(125deg, 
        rgba(255,255,255,0.28) 0%, 
        rgba(255,255,255,0.08) 25%, 
        transparent 45%, 
        transparent 70%,
        rgba(255,255,255,0.04) 75%,
        rgba(255,255,255,0.12) 100%
      );
      z-index: 6;
      pointer-events: none;
    }

    /* LCD 내부 스크린 깊이 음영 */
    .lcd-screen {
      position: relative;
      overflow: hidden;
      box-shadow: 
        inset 4px 4px 12px rgba(0, 0, 0, 0.75), 
        inset -2px -2px 6px rgba(255,255,255,0.2);
    }

    /* LCD 픽셀 격자 텍스처 */
    .lcd-screen::before {
      content: " ";
      display: block;
      position: absolute;
      top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(0, 0, 0, 0.12) 50%, rgba(0, 0, 0, 0) 50%), 
                  linear-gradient(90deg, rgba(0, 0, 0, 0.12) 50%, rgba(0, 0, 0, 0) 50%);
      background-size: 2.5px 2.5px;
      z-index: 5;
      pointer-events: none;
    }

    /* 누르면 들어가는 3D 버튼 반응 */
    .tactile-btn {
      position: relative;
      transition: all 0.05s ease;
      cursor: pointer;
    }
    .tactile-btn:active {
      transform: translateY(2px);
      box-shadow: 
        inset 0 1px 3px rgba(0, 0, 0, 0.4),
        0 1px 1px rgba(255, 255, 255, 0.1) !important;
    }

    /* LCD 리얼 껌벅임 효과 */
    @keyframes lcdFlash {
      0% { opacity: 0.5; filter: brightness(0.6); }
      40% { opacity: 1; filter: brightness(1.4); }
      70% { opacity: 0.8; filter: brightness(0.9); }
      100% { opacity: 1; filter: brightness(1); }
    }
    .lcd-active {
      animation: lcdFlash 0.4s ease-out forwards;
    }
  </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col justify-between p-4 md:p-6">

  <header class="w-full max-w-6xl mx-auto flex flex-col sm:flex-row justify-between items-center py-4 border-b border-slate-900 mb-6 gap-4">
    <div class="flex items-center gap-3">
      <span class="text-3xl filter drop-shadow-[0_2px_8px_rgba(236,72,153,0.3)]">📟</span>
      <div>
        <h1 class="text-2xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-purple-400">POCKET BELL EMULATOR</h1>
        <p class="text-[10px] text-slate-500 font-mono tracking-widest uppercase">Professional Retro Device Lab</p>
      </div>
    </div>
    
    <div class="flex bg-slate-950 p-1.5 rounded-2xl border border-slate-900 shadow-inner">
      <button onclick="changeDevice('telemessage')" id="tab-tele" class="px-5 py-2.5 rounded-xl text-xs font-bold transition-all bg-pink-600 text-white shadow">
        Telemessage
      </button>
      <button onclick="changeDevice('pokebell')" id="tab-poke" class="px-5 py-2.5 rounded-xl text-xs font-bold text-slate-400 transition-all hover:text-slate-200">
        Pocket Bell
      </button>
      <button onclick="changeDevice('kitsch')" id="tab-kitsch" class="px-5 py-2.5 rounded-xl text-xs font-bold text-slate-400 transition-all hover:text-slate-200 font-mono">
        Kitsch (Y2K)
      </button>
    </div>
  </header>

  <main class="w-full max-w-6xl mx-auto my-auto grid grid-cols-1 lg:grid-cols-12 gap-8 items-center">
    
    <section class="lg:col-span-7 flex flex-col items-center justify-center p-2">
      
      <div id="capture-area" class="p-10 rounded-[56px] bg-transparent flex items-center justify-center">
        
        <div id="bell-body" class="real-device w-[370px] sm:w-[440px] h-[275px] sm:h-[315px] rounded-[48px] relative p-6 flex flex-col justify-between transition-all duration-500">
          
          <div id="device-decorations" class="absolute inset-0 pointer-events-none rounded-[44px] overflow-hidden"></div>

          <div class="flex justify-between items-center px-5 pt-1 z-10">
            <div id="brand-logo" class="flex items-center"></div>
            <div id="model-text" class="text-[9.5px] font-mono font-black tracking-widest text-white/50 uppercase"></div>
          </div>

          <div class="w-full px-1.5 z-10">
            <div id="lcd-bezel" class="p-3.5 rounded-[26px] bezel-3d transition-colors duration-500">
              
              <div id="lcd-screen" class="lcd-screen lcd-active w-full h-[110px] sm:h-[125px] rounded-lg p-3 flex flex-col justify-between">
                <div class="lcd-glass-reflection"></div>

                <div class="flex justify-between items-center text-[10px] font-bold opacity-85 z-10 font-mono">
                  <div class="flex items-center gap-1.5" id="lcd-indicators-left">
                    <span id="lcd-sig" class="inline-block">
                      <div class="flex items-end gap-[1px] h-[9px]">
                        <div class="w-[2px] h-[3px] bg-current"></div>
                        <div class="w-[2px] h-[6px] bg-current"></div>
                        <div class="w-[2px] h-[9px] bg-current"></div>
                      </div>
                    </span>
                    <span id="lcd-sound" class="animate-pulse"><i class="fa-solid fa-bell text-[8px]"></i></span>
                  </div>
                  
                  <div class="flex items-center gap-1 bg-black/10 px-2 py-0.5 rounded text-[9.5px]" style="font-family: 'Share Tech Mono', monospace;">
                    <i class="fa-regular fa-clock text-[8px] opacity-70"></i>
                    <span id="lcd-clock-display" class="tracking-widest">12:00</span>
                  </div>

                  <div class="flex items-center gap-1" id="lcd-indicators-right
