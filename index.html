<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real Retro Pocket Bell Emulator Pro</title>
  
  <!-- Tailwind CSS & FontAwesome Icons -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Google Fonts for Retro & Y2K Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Galmuri9:wght@400;700&family=Share+Tech+Mono&family=Great+Vibes&display=swap" rel="stylesheet">
  
  <!-- html2canvas Library for Export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    body {
      font-family: 'Galmuri9', sans-serif;
      background-color: #0b0c10;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(244, 63, 94, 0.08) 0, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.08) 0, transparent 40%);
    }

    /* 초극사실 3D 하드웨어 케이스 물리 그림자 */
    .real-device {
      box-shadow: 
        0 30px 70px -15px rgba(0, 0, 0, 0.95),
        0 15px 30px -10px rgba(0, 0, 0, 0.9),
        inset 0 4px 5px rgba(255, 255, 255, 0.35),
        inset 0 -8px 16px rgba(0, 0, 0, 0.7);
      transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.1);
    }

    /* 입체감이 살아있는 LCD 외부 베젤 몰딩 */
    .bezel-3d {
      box-shadow: 
        inset 0 4px 10px rgba(0, 0, 0, 0.9),
        inset 0 -2px 5px rgba(255, 255, 255, 0.15),
        0 2px 4px rgba(255, 255, 255, 0.1),
        0 -1px 2px rgba(0, 0, 0, 0.5);
    }

    /* 리얼 글래스 곡면 굴절 반사광 */
    .lcd-glass-reflection {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(125deg, 
        rgba(255,255,255,0.28) 0%, 
        rgba(255,255,255,0.08) 25%, 
        transparent 45%, 
        transparent 70%,
        rgba(255,255,255,0.04) 75%,
        rgba(255,255,255,0.12) 100%
      );
      z-index: 6;
      pointer-events: none;
    }

    /* LCD 내부 스크린 깊이 음영 */
    .lcd-screen {
      position: relative;
      overflow: hidden;
    }

    /* LCD 픽셀 격자 텍스처 (도트 패턴) */
    .lcd-screen::before {
      content: " ";
      display: block;
      position: absolute;
      top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(0, 0, 0, 0.12) 50%, rgba(0, 0, 0, 0) 50%), 
                  linear-gradient(90deg, rgba(0, 0, 0, 0.12) 50%, rgba(0, 0, 0, 0) 50%);
      background-size: 2.5px 2.5px;
      z-index: 5;
      pointer-events: none;
    }

    /* 이미지 저장 시 도트 및 어두운 레이어 임시 해제용 크로스 필터 */
    .is-exporting::before {
      display: none !important;
    }
    .is-exporting .lcd-glass-reflection {
      display: none !important;
    }

    /* 누르면 들어가는 3D 버튼 반응 */
    .tactile-btn {
      position: relative;
      transition: all 0.05s ease;
      cursor: pointer;
    }
    .tactile-btn:active {
      transform: translateY(2px);
      box-shadow: 
        inset 0 1px 3px rgba(0, 0, 0, 0.4),
        0 1px 1px rgba(255, 255, 255, 0.1) !important;
    }

    /* LCD 리얼 껌벅임 효과 */
    @keyframes lcdFlash {
      0% { opacity: 0.5; filter: brightness(0.6); }
      40% { opacity: 1; filter: brightness(1.4); }
      70% { opacity: 0.8; filter: brightness(0.9); }
      100% { opacity: 1; filter: brightness(1); }
    }
    .lcd-active {
      animation: lcdFlash 0.4s ease-out forwards;
    }
  </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col justify-between p-4 md:p-6">

  <!-- Header -->
  <header class="w-full max-w-6xl mx-auto flex flex-col sm:flex-row justify-between items-center py-4 border-b border-slate-900 mb-6 gap-4">
    <div class="flex items-center gap-3">
      <span class="text-3xl filter drop-shadow-[0_2px_8px_rgba(236,72,153,0.3)]">📟</span>
      <div>
        <h1 class="text-2xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-purple-400">POCKET BELL EMULATOR</h1>
        <p class="text-[10px] text-slate-500 font-mono tracking-widest uppercase">Professional Retro Device Lab</p>
      </div>
    </div>
    
    <!-- Device Type Switches -->
    <div class="flex bg-slate-950 p-1.5 rounded-2xl border border-slate-900 shadow-inner">
      <button onclick="changeDevice('telemessage')" id="tab-tele" class="px-5 py-2.5 rounded-xl text-xs font-bold transition-all text-slate-400 hover:text-slate-200">
        Telemessage
      </button>
      <button onclick="changeDevice('pokebell')" id="tab-poke" class="px-5 py-2.5 rounded-xl text-xs font-bold transition-all bg-pink-600 text-white shadow">
        Pocket Bell
      </button>
      <button onclick="changeDevice('kitsch')" id="tab-kitsch" class="px-5 py-2.5 rounded-xl text-xs font-bold text-slate-400 transition-all hover:text-slate-200 font-mono">
        Kitsch (Y2K)
      </button>
    </div>
  </header>

  <!-- Main Workspace -->
  <main class="w-full max-w-6xl mx-auto my-auto grid grid-cols-1 lg:grid-cols-12 gap-8 items-center">
    
    <!-- LEFT: 3D Device Rendering Viewport -->
    <section class="lg:col-span-7 flex flex-col items-center justify-center p-2 overflow-visible">
      
      <div id="capture-area" class="p-10 rounded-[56px] bg-transparent flex items-center justify-center overflow-visible">
        
        <!-- HARDWARE BODY (가장자리 회색 깨짐 버그 완전 패치: 테일윈드 그라데이션 제거 및 하드코딩된 표준 CSS 그라데이션 주입) -->
        <div id="bell-body" class="real-device w-[370px] sm:w-[440px] h-[275px] sm:h-[315px] rounded-[48px] relative p-6 flex flex-col justify-between transition-all duration-500" style="background: linear-gradient(135deg, #1e1e1e 0%, #1a1a1a 50%, #111111 100%) !important; border: 4px solid #2d2d2d !important; border-radius: 48px !important;">
          
          <div id="device-decorations" class="absolute inset-0 pointer-events-none rounded-[44px]"></div>

          <!-- TOP BRAND PANEL -->
          <div class="flex justify-between items-center px-5 pt-1 z-10">
            <div id="brand-logo" class="flex items-center"></div>
            <div id="model-text" class="text-[9.5px] font-mono font-black tracking-widest uppercase"></div>
          </div>

          <!-- LCD BEZEL (가장자리 깨짐 방지: 테일윈드 그라데이션 제거) -->
          <div class="w-full px-1.5 z-10 overflow-visible">
            <div id="lcd-bezel" class="p-3.5 rounded-[26px] bezel-3d transition-colors duration-500 overflow-visible" style="background: linear-gradient(180deg, #111 0%, #000 100%) !important; border: 2px solid #000 !important; border-radius: 26px !important;">
              
              <!-- LCD SCREEN (화면 처짐 버그 완전 패치: Flex layout 제거 및 absolute positioning 기반 정밀 픽셀 배치 시스템 도입) -->
              <div id="lcd-screen" class="lcd-screen lcd-active w-full h-[110px] sm:h-[125px] rounded-lg p-3 relative overflow-hidden" style="background-color: #8f9c8d; border-radius: 8px !important; box-sizing: border-box;">
                <div class="lcd-glass-reflection"></div>

                <!-- LCD Top row: Status Signals & Clock (위치 및 행간 강제 고정) -->
                <div class="flex justify-between items-center text-[10px] font-bold opacity-85 z-10 font-mono" style="position: absolute; top: 12px; left: 12px; right: 12px; height: 16px; line-height: 16px; box-sizing: border-box;">
                  <div class="flex items-center gap-1.5" id="lcd-indicators-left">
                    <span id="lcd-sig" class="inline-block" style="display: inline-flex; align-items: flex-end; height: 9px;">
                      <div class="flex items-end gap-[1px] h-[9px]">

                        <div class="w-[2px] h-[6px] bg-current"></div>

                      </div>
                    </span>
                    <span id="lcd-sound" class="animate-pulse"><i class="fa-solid fa-bell text-[8px]"></i></span>
                  </div>
                  
                  <!-- Integrated Clock Display (처짐 방지를 위한 line-height 고정) -->
                  <div class="flex items-center gap-1 bg-black/10 px-2 py-0.5 rounded text-[9.5px]" style="font-family: 'Share Tech Mono', monospace; height: 16px; display: inline-flex; align-items: center; justify-content: center;">
                    <i class="fa-regular fa-clock text-[8px] opacity-70" style="position: relative; top: 0.5px;"></i>
                    <span id="lcd-clock-display" class="tracking-widest" style="line-height: 1; display: inline-block;">12:00</span>
                  </div>

                  <div class="flex items-center gap-1" id="lcd-indicators-right">
                    <span id="lcd-bat"><i class="fa-solid fa-battery-three-quarters text-[9px]"></i></span>
                  </div>
                </div>

                <!-- LCD Message Rows (처짐 방지: 고정 픽셀 배치 및 line-height 강제 매핑) -->
                <div class="z-10 text-center" style="position: absolute; top: 40px; left: 12px; right: 12px; height: 48px; display: block; overflow: visible;">
                  <div id="lcd-line-1" class="lcd-text text-base sm:text-lg font-bold leading-none w-full" style="height: 24px; line-height: 24px; vertical-align: top; display: block;">

                    889-9191
                  </div>
                </div>

                <!-- LCD Bottom row (위치 강제 고정) -->
                <div class="flex justify-between items-center text-[8.5px] font-bold opacity-75 z-10 font-mono" style="position: absolute; bottom: 8px; left: 12px; right: 12px; height: 14px; line-height: 14px; box-sizing: border-box;">
                  <div id="lcd-foot-left" class="w-8"></div>
                  <div id="lcd-foot-mid" class="tracking-widest text-[7.5px] opacity-40">▲ M O D E ▼</div>
                  <div id="lcd-foot-right" class="w-8 text-right"></div>
                </div>

              </div>

            </div>
          </div>

          <!-- PHYSICAL KEYPAD PANEL -->
          <div id="keypad-panel" class="w-full flex justify-around items-center px-4 pb-1 z-10"></div>

        </div>

      </div>
      
    </section>

    <!-- RIGHT: Control Station & Form Configuration -->
    <section class="lg:col-span-5 bg-slate-950 p-6 rounded-3xl border border-slate-900 shadow-2xl space-y-5">
      
      <div class="border-b border-slate-900 pb-3">
        <h2 class="text-lg font-black text-pink-500 flex items-center gap-2">
          <span><i class="fa-solid fa-sliders text-base"></i></span>
          <span>커스텀 제어판</span>
        </h2>
        <p class="text-[9px] text-slate-500 font-mono tracking-widest uppercase">PAGER STUDIO ENGINE</p>
      </div>

      <!-- Text Lines Configuration -->
      <div class="space-y-4">
        <div>

            <label class="text-xs font-bold text-slate-400">첫 번째 줄 (가타카나 / 한자 / 영문)</label>

        </div>

        <div>
          <div class="flex justify-between items-center mb-1.5">

            <span class="text-[10px] font-mono text-slate-600" id="count-2">8 / 15</span>
          </div>
          <input type="text" id="input-2" oninput="syncLCD()" maxlength="15" value="889-9191" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-3 text-sm text-pink-400 font-bold tracking-wider focus:outline-none focus:border-pink-500 transition-all shadow-inner">
        </div>

        <!-- Retro Clock Settings -->
        <div class="bg-slate-900 p-4 rounded-2xl border border-slate-800 space-y-3">
          <div class="flex justify-between items-center">
            <label class="text-xs font-bold text-slate-300 flex items-center gap-1.5">
              <i class="fa-regular fa-clock text-pink-500"></i>
              <span>호출 시간 설정</span>
            </label>
            <button onclick="setCurrentTime()" class="text-[10px] bg-pink-900/40 text-pink-300 border border-pink-700/50 hover:bg-pink-800/50 px-2.5 py-1 rounded-md transition-all font-bold">
              <i class="fa-solid fa-wand-magic-sparkles mr-1"></i> 현재시간 동기화
            </button>
          </div>
          <input type="text" id="input-time" oninput="syncLCD()" maxlength="8" value="12:00" placeholder="예: 12:00 또는 AM 08:30" class="w-full bg-slate-950 border border-slate-850 rounded-xl p-2.5 text-xs text-slate-200 font-mono tracking-widest focus:outline-none focus:border-pink-500 transition-all">
        </div>
      </div>

      <!-- Signals & Hardware Specs -->
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-[11px] text-slate-400 block mb-1">📶 안테나 레벨</label>
          <select id="config-signal" onchange="applyStatus()" class="w-full bg-slate-900 border border-slate-850 rounded-xl p-2.5 text-xs text-slate-300 focus:outline-none">
            <option value="3">최대 수신 (Level 3)</option>
            <option value="1">수신 약함 (Level 1)</option>
            <option value="0">권외 지역 (OUT)</option>
          </select>
        </div>
        <div>
          <label class="text-[11px] text-slate-400 block mb-1">🔋 배터리 팩</label>
          <select id="config-battery" onchange="applyStatus()" class="w-full bg-slate-900 border border-slate-850 rounded-xl p-2.5 text-xs text-slate-300 focus:outline-none">
            <option value="full">배터리 가득참 (100%)</option>
            <option value="low">교체 필요 (10%)</option>
          </select>
        </div>
      </div>

      <!-- Action Panel -->
      <div class="space-y-2 pt-3 border-t border-slate-900">
        <button onclick="exportPNG()" class="w-full bg-gradient-to-r from-pink-500 to-purple-600 hover:from-pink-600 hover:to-purple-700 text-white font-black py-4 px-6 rounded-2xl shadow-lg shadow-pink-900/10 transition-all flex items-center justify-center gap-2">
          <i class="fa-solid fa-camera-retro text-lg animate-bounce"></i>
          <span>고해상도 투명 PNG 이미지 저장</span>
        </button>
        <div class="grid grid-cols-2 gap-2">
          <button onclick="triggerFlash()" class="bg-slate-900 hover:bg-slate-850 text-slate-300 text-xs py-2.5 rounded-xl flex items-center justify-center gap-2 border border-slate-800">
            <i class="fa-solid fa-arrows-rotate"></i>
            <span>화면 리부팅</span>
          </button>
          <button onclick="playBeep()" class="bg-slate-900 hover:bg-slate-850 text-slate-300 text-xs py-2.5 rounded-xl flex items-center justify-center gap-2 border border-slate-800">
            <i class="fa-solid fa-bell-ring text-yellow-500 animate-pulse"></i>
            <span>벨소리 울리기</span>
          </button>
        </div>
      </div>

    </section>

  </main>

  <!-- Footer -->
  <footer class="w-full max-w-6xl mx-auto text-center py-6 border-t border-slate-950 mt-8">
    <p class="text-[10px] text-slate-600 leading-relaxed font-sans">
      &copy; 2026 Real Retro Pocket Bell Emulator Pro. 본 프로젝트는 비상업적 목적의 레트로 그래픽 에뮬레이터입니다.<br>

    </p>
  </footer>

          <div class="w-1/3 text-left overflow-visible">
            <span class="text-[8.5px] font-sans font-black text-[#42b9d0] tracking-tight flex items-center gap-0.5"><i class="fa-solid fa-circle-nodes"></i> NTT</span>
          </div>
          <div class="w-2/3 text-right pr-4 overflow-visible">
            <span class="text-[12px] font-sans font-black text-slate-400 tracking-widest">POCKET BELL</span>
          </div>
        `
      },
      'kitsch': {
        name: "Kitsch",
        model: "galaxy message",
        // 가장자리 회색 깨짐 버그 차단: 테일윈드 class 대신 html2canvas 전용 CSS 하드코딩 그라데이션 주입
        bodyStyle: "background: linear-gradient(45deg, #ebd2f8 0%, #f9d7df 50%, #d6e7fd 100%) !important; border-color: rgba(255, 255, 255, 0.8) !important;",
        bezelStyle: "background: linear-gradient(180deg, #fbf6fc 0%, #ebdcf8 100%) !important; border-color: rgba(218, 187, 233, 0.8) !important;",
        lcdBg: "#dbebd6",
        lcdColor: "#223525",
        decorHTML: `
          <div class="absolute inset-0 w-full h-full rounded-[44px] overflow-hidden">
            <svg class="absolute inset-0 w-full h-full pointer-events-none drop-shadow-[0_1.5px_2px_rgba(255,255,255,0.85)]" viewBox="0 0 440 315">
              <path d="M 415.0,110.0 L 432.6,160.7 L 486.3,161.8 L 443.5,194.3 L 459.1,245.7 L 415.0,215.0 L 370.9,245.7 L 386.5,194.3 L 343.7,161.8 L 397.4,160.7 Z" fill="none" stroke="#73469e" stroke-width="6.5" stroke-linejoin="round" />
              <path d="M 125.0,200.0 L 135.6,230.4 L 167.8,231.1 L 142.1,250.6 L 151.5,281.4 L 125.0,263.0 L 98.5,281.4 L 107.9,250.6 L 82.2,231.1 L 114.4,230.4 Z" fill="none" stroke="#73469e" stroke-width="4.8" stroke-linejoin="round" />
              <path d="M 350.0,250.0 L 359.4,277.1 L 388.0,277.6 L 365.2,294.9 L 373.5,322.4 L 350.0,306.0 L 326.5,322.4 L 334.8,294.9 L 312.0,277.6 L 340.6,277.1 Z" fill="none" stroke="#73469e" stroke-width="4.8" stroke-linejoin="round" />
            </svg>
          </div>

          <!-- LCD 하단 영문 필기체 명판 -->
          <div class="absolute bottom-[82px] sm:bottom-[96px] left-0 right-0 flex justify-center items-center pointer-events-none">
            <span style="font-family: 'Great Vibes', cursive;" class="text-2xl sm:text-[29px] font-bold text-[#5c3384] tracking-widest drop-shadow-[0_1.5px_1.5px_rgba(255,255,255,0.8)]">Pocket Bell</span>
          </div>
        `,
        brandLogoHTML: `
          <div class="flex items-center gap-1 text-[#73469e] font-black italic text-xs tracking-wider drop-shadow-[0_1px_1px_rgba(255,255,255,0.8)]">
            <i class="fa-solid fa-moon"></i>
            <span>POCKET BELL</span>
          </div>
        `,
        buttonsHTML: `
          <div class="flex justify-center gap-6 w-full">
            <button onclick="triggerFlash(); playToggle();" class="tactile-btn w-[70px] sm:w-[85px] h-[16px] sm:h-[18px] rounded-full shadow-[0_4px_6px_rgba(0,0,0,0.12),inset_0_1px_1px_white] border border-zinc-300" style="background: linear-gradient(180deg, #ffffff 0%, #f4f4f5 50%, #e4e4e7 100%) !important; background-color: #ffffff !important;"></button>
            <button onclick="triggerFlash(); playToggle();" class="tactile-btn w-[70px] sm:w-[85px] h-[16px] sm:h-[18px] rounded-full shadow-[0_4px_6px_rgba(0,0,0,0.12),inset_0_1px_1px_white] border border-zinc-300" style="background: linear-gradient(180deg, #ffffff 0%, #f4f4f5 50%, #e4e4e7 100%) !important; background-color: #ffffff !important;"></button>
          </div>
        `
      }
    };

    // 1. 기종 변경 메커니즘
    function changeDevice(modelKey) {
      currentDevice = modelKey;
      const spec = devices[modelKey];

      ['tele', 'poke', 'kitsch'].forEach(tab => {
        document.getElementById(`tab-${tab}`).className = "px-5 py-2.5 rounded-xl text-xs font-bold transition-all text-slate-400 hover:text-slate-200";
      });
      const tabMap = { 'telemessage': 'tele', 'pokebell': 'poke', 'kitsch': 'kitsch' };
      document.getElementById(`tab-${tabMap[modelKey]}`).className = "px-5 py-2.5 rounded-xl text-xs font-bold transition-all bg-pink-600 text-white shadow-lg";

      const bellBody = document.getElementById('bell-body');
      bellBody.style.cssText = spec.bodyStyle; // 가장자리 회색 깨짐 버그 차단: 테일윈드 class 대신 html2canvas 전용 CSS 하드코딩 그라데이션 주입
      bellBody.className = `real-device w-[370px] sm:w-[440px] h-[275px] sm:h-[315px] rounded-[48px] relative p-6 flex flex-col justify-between transition-all duration-500`;

      document.getElementById('device-decorations').innerHTML = spec.decorHTML;
      document.getElementById('brand-logo').innerHTML = spec.brandLogoHTML;
      
      const modelEl = document.getElementById('model-text');
      modelEl.textContent = spec.model;
      if (modelKey === 'kitsch') {
        modelEl.className = "text-[10px] font-mono font-black tracking-widest text-[#73469e]/80 italic lowercase";
      } else {
        modelEl.className = "text-[9.5px] font-mono font-black tracking-widest text-white/50 uppercase";
      }

      document.getElementById('keypad-panel').innerHTML = spec.buttonsHTML;

      const lcdBezel = document.getElementById('lcd-bezel');
      const lcdScreen = document.getElementById('lcd-screen');
      lcdBezel.style.cssText = spec.bezelStyle; // 가장자리 회색 깨짐 버그 차단: 테일윈드 class 대신 html2canvas 전용 CSS 하드코딩 그라데이션 주입
      lcdBezel.className = `p-3.5 rounded-[26px] bezel-3d transition-colors duration-500 overflow-visible`;
      
      lcdScreen.style.backgroundColor = spec.lcdBg;
      lcdScreen.style.color = spec.lcdColor;

      document.getElementById('lcd-foot-left').innerHTML = "";
      document.getElementById('lcd-foot-right').innerHTML = "";

      playToggle();
      triggerFlash();
    }

    // 2. LCD 화면 실시간 렌더링 동기화
    function syncLCD() {
      const val1 = document.getElementById('input-1').value;
      const val2 = document.getElementById('input-2').value;
      const valTime = document.getElementById('input-time').value;

      document.getElementById('count-1').textContent = `${val1.length} / 15`;
      document.getElementById('count-2').textContent = `${val2.length} / 15`;

      document.getElementById('lcd-line-1').textContent = val1 !== "" ? val1 : " ";
      document.getElementById('lcd-line-2').textContent = val2 !== "" ? val2 : " ";
      document.getElementById('lcd-clock-display').textContent = valTime !== "" ? valTime : "--:--";
    }

    // 3. 현재 실제 로컬 시간 가져와 동기화
    function setCurrentTime() {
      const now = new Date();
      let hours = now.getHours();
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const ampm = hours >= 12 ? 'PM' : 'AM';
      hours = hours % 12;
      hours = hours ? hours : 12;
      const strTime = `${ampm} ${String(hours).padStart(2, '0')}:${minutes}`;
      
      document.getElementById('input-time').value = strTime;
      syncLCD();
      playToggle();
    }

    // 4. 안테나 및 배터리 센서 기호 제어
    function applyStatus() {
      const sig = document.getElementById('config-signal').value;
      const bat = document.getElementById('config-battery').value;

      const sigEl = document.getElementById('lcd-sig');
      const batEl = document.getElementById('lcd-bat');

      if (sig === "3") {
        sigEl.innerHTML = `
          <div class="flex items-end gap-[1px] h-[9px]">
            <div class="w-[2px] h-[3px] bg-current"></div>
            <div class="w-[2px] h-[6px] bg-current"></div>
            <div class="w-[2px] h-[9px] bg-current"></div>
          </div>`;
      } else if (sig === "1") {
        sigEl.innerHTML = `
          <div class="flex items-end gap-[1px] h-[9px]">
            <div class="w-[2px] h-[3px] bg-current"></div>
            <div class="w-[2px] h-[6px] opacity-25 bg-current"></div>
            <div class="w-[2px] h-[9px] opacity-25 bg-current"></div>
          </div>`;
      } else {
        sigEl.innerHTML = `<span class="text-[7px] border border-current px-0.5 rounded leading-none scale-90 inline-block">OUT</span>`;
      }

      if (bat === "full") {
        batEl.innerHTML = `<i class="fa-solid fa-battery-three-quarters text-[9px]"></i>`;
      } else {
        batEl.innerHTML = `<i class="fa-solid fa-battery-empty text-[9px] animate-pulse text-red-800"></i>`;
      }
    }

    // 5. 화면 깜빡임 리셋 플래시
    function triggerFlash() {
      const lcd = document.getElementById('lcd-screen');
      lcd.classList.remove('lcd-active');
      void lcd.offsetWidth; 
      lcd.classList.add('lcd-active');
    }

    // 6. 음향 재생 모듈
    let audioCtx = null;

    function playToggle() {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(3200, now);

        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(0.06, now + 0.001);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.03);

        osc.start(now);
        osc.stop(now + 0.04);
      } catch(e){}
    }

    function playBeep() {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const now = audioCtx.currentTime;

        function beep(time, duration) {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();

          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.type = 'sine';
          osc.frequency.setValueAtTime(2500, time);

          gain.gain.setValueAtTime(0, time);
          gain.gain.linearRampToValueAtTime(0.15, time + 0.005);
          gain.gain.exponentialRampToValueAtTime(0.001, time + duration - 0.005);

          osc.start(time);
          osc.stop(time + duration);
        }

        beep(now, 0.12);
        beep(now + 0.15, 0.12);
        beep(now + 0.4, 0.12);
        beep(now + 0.55, 0.12);
      } catch(e){}
    }

    // 7. 고해상도 무배경 투명 PNG 인코딩 저장 (스크롤 보정 및 변환 버그 완전 패치)
    function exportPNG() {
      const captureArea = document.getElementById('capture-area');
      const lcdScreen = document.getElementById('lcd-screen');

      // 로딩 애니메이션 마운트
      const loader = document.createElement('div');
      loader.className = "fixed inset-0 bg-black/85 flex flex-col justify-center items-center z-50 text-white font-sans text-sm gap-3 p-6 text-center";
      loader.innerHTML = `
        <i class="fa-solid fa-compact-disc animate-spin text-4xl text-pink-500"></i>
        <span class="font-bold tracking-widest">초고해상도 투명 PNG 그래픽 합성 중...</span>
        <p class="text-xs text-slate-400">가장자리 회색 깨짐 및 텍스트 처짐 버그를 우회하기 위해 인코딩 방식이 최적화되었습니다.</p>
      `;
      document.body.appendChild(loader);

      // 인코딩 순간에만 LCD 내부 격자 패턴과 유리막 반사를 임시 숨깁니다.
      lcdScreen.classList.add('is-exporting');

      setTimeout(() => {
        html2canvas(captureArea, {
          backgroundColor: null,
          scale: 4, 
          logging: false,
          useCORS: true,
          allowTaint: true,
          scrollX: 0,
          scrollY: -window.scrollY // 스크롤 시 화면 캡처 영역이 미세하게 틀어지는 오프셋 완전 방지
        }).then(canvas => {
          // 저장 후 필터 복원
          lcdScreen.classList.remove('is-exporting');

          const a = document.createElement('a');
          a.download = `retro_pager_3d_${currentDevice}.png`;
          a.href = canvas.toDataURL('image/png');
          a.click();
          document.body.removeChild(loader);
        }).catch(err => {
          console.error(err);
          lcdScreen.classList.remove('is-exporting');
          document.body.removeChild(loader);
          alert("렌더링 도중 기술적 에러가 발생했습니다.");
        });
      }, 400);
    }

    // 최초 로드 시 'pokebell' 활성화 설정 유지
    window.onload = function() {
      setCurrentTime();
      changeDevice('pokebell'); 
      applyStatus();
    }
  </script>
</body>
